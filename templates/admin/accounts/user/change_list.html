{% extends "admin/change_list.html" %}
{% load i18n admin_urls static admin_list %}

{% block search %}
    {% if show_errands_report %}
    <div style="margin-bottom: 20px; padding: 15px; background-color: #e3f2fd; border-radius: 5px; border-left: 4px solid #2196F3;">
        <a href="{{ errands_report_url }}" class="button" style="background-color: #2196F3; color: white; padding: 10px 20px; text-decoration: none; border-radius: 3px; display: inline-block;">
            📊 View Client Errands Report
        </a>
        <p style="margin: 10px 0 0 0; color: #555; font-size: 14px;">
            View a comprehensive list of all clients and their errand statistics.
        </p>
    </div>
    {% endif %}
    
    {{ block.super }}
{% endblock %}
