services:
  - type: web
    name: fagierrands-backend
    runtime: python
    buildCommand: "./build_file.sh"
    startCommand: "gunicorn fagierrandsbackup.wsgi --log-file -"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: fagierrands-db
          property: connectionString
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: MEDIAFIRE_APP_ID
        sync: false
      - key: MEDIAFIRE_API_KEY
        sync: false
      - key: MEDIAFIRE_EMAIL
        sync: false
      - key: MEDIAFIRE_PASSWORD
        sync: false
      - key: EMAIL_HOST
        value: smtp-relay.brevo.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USE_TLS
        value: True
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: MPESA_ENVIRONMENT
        value: sandbox
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: BASE_URL
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        value: admin@fagierrands.com
      - key: ADMIN_PASSWORD
        value: admin123
      - key: REDIS_URL
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: WEBPUSH_EMAIL
        sync: false

databases:
  - name: fagierrands-db
    databaseName: fagierrands
    user: fagierrands
